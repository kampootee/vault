<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoW Weekly Checklist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .check-box {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .check-box.active-raid { background-color: #ef4444; border-color: #f87171; box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
        .check-box.active-dungeon { background-color: #3b82f6; border-color: #60a5fa; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
        .check-box.active-world { background-color: #10b981; border-color: #34d399; box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }

        /* Role Selection Styling */
        .role-option {
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .role-option.selected {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header Area -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white">Vault Tracker</h1>
                <p class="text-slate-400 text-sm">Weekly progress for all characters</p>
            </div>
            <div class="flex gap-3">
                <button onclick="resetAll()" class="px-4 py-2 text-sm font-medium text-slate-300 hover:text-white bg-slate-800 hover:bg-slate-700 rounded-lg transition-colors border border-slate-700">
                    Reset Week
                </button>
                <button onclick="openModal()" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-500 rounded-lg transition-shadow shadow-lg shadow-blue-900/20">
                    + Add Character
                </button>
            </div>
        </header>

        <!-- Labels Row (Desktop) -->
        <div class="hidden md:grid grid-cols-12 gap-4 px-6 mb-2 text-xs font-semibold uppercase tracking-wider text-slate-500">
            <div class="col-span-3">Character</div>
            <div class="col-span-3 text-center">Raids (2/4/6)</div>
            <div class="col-span-3 text-center">Dungeons (1/4/8)</div>
            <div class="col-span-3 text-center">World (2/4/8)</div>
        </div>

        <!-- Character List -->
        <div id="characterList" class="space-y-3">
            <!-- Rows injected here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20 glass-panel rounded-2xl">
            <p class="text-slate-400">No characters added yet. Click "+ Add Character" to begin.</p>
        </div>
    </div>

    <!-- Add Character Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="glass-panel w-full max-w-lg rounded-2xl p-6 shadow-2xl">
            <h2 class="text-xl font-semibold mb-4 text-white">Add Character</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 block">Character Name</label>
                    <input type="text" id="charNameInput" placeholder="e.g. Thrall-Draenor" 
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 block">Class</label>
                        <select id="charClassInput" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="Warrior">Warrior</option>
                            <option value="Paladin">Paladin</option>
                            <option value="Hunter">Hunter</option>
                            <option value="Rogue">Rogue</option>
                            <option value="Priest">Priest</option>
                            <option value="DeathKnight">Death Knight</option>
                            <option value="Shaman">Shaman</option>
                            <option value="Mage">Mage</option>
                            <option value="Warlock">Warlock</option>
                            <option value="Monk">Monk</option>
                            <option value="Druid">Druid</option>
                            <option value="DemonHunter">Demon Hunter</option>
                            <option value="Evoker">Evoker</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 block">Role</label>
                        <div class="flex gap-2">
                            <button onclick="setRole('tank')" class="role-btn role-option p-2 bg-slate-900 rounded-xl flex-1 flex justify-center items-center" data-role="tank" title="Tank">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                            </button>
                            <button onclick="setRole('healer')" class="role-btn role-option p-2 bg-slate-900 rounded-xl flex-1 flex justify-center items-center" data-role="healer" title="Healer">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            </button>
                            <button onclick="setRole('dps')" class="role-btn role-option p-2 bg-slate-900 rounded-xl flex-1 flex justify-center items-center selected" data-role="dps" title="DPS">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 17.5L3 6V3h3l11.5 11.5"></path><path d="M13 19l6-6"></path><path d="M16 22l5-5"></path><circle cx="20" cy="4" r="2"></circle></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex gap-3 justify-end mt-8">
                <button onclick="closeModal()" class="px-5 py-2.5 text-slate-400 hover:text-white transition-colors">Cancel</button>
                <button onclick="addCharacter()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 rounded-xl font-medium transition-colors text-white">Create Character</button>
            </div>
        </div>
    </div>

    <script>
        const CLASS_COLORS = {
            Warrior: '#C69B6D',
            Paladin: '#F48CBA',
            Hunter: '#AAD372',
            Rogue: '#FFF468',
            Priest: '#FFFFFF',
            DeathKnight: '#C41E3A',
            Shaman: '#0070DD',
            Mage: '#3FC7EB',
            Warlock: '#8788EE',
            Monk: '#00FF98',
            Druid: '#FF7C0A',
            DemonHunter: '#A330C9',
            Evoker: '#33937F'
        };

        const ROLE_ICONS = {
            tank: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
            healer: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`,
            dps: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 17.5L3 6V3h3l11.5 11.5"></path><path d="M13 19l6-6"></path><path d="M16 22l5-5"></path><circle cx="20" cy="4" r="2"></circle></svg>`
        };

        let state = {
            characters: []
        };

        let selectedRole = 'dps';

        const STORAGE_KEY = 'wow_checklist_modern_v2';

        function load() {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) {
                state = JSON.parse(data);
            } else {
                state.characters = [
                    { id: Date.now(), name: 'Main Character', class: 'Warrior', role: 'tank', raid: [false, false, false], dungeon: [false, false, false], world: [false, false, false] }
                ];
            }
            render();
        }

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function toggleSlot(charId, category, index) {
            const char = state.characters.find(c => c.id === charId);
            if (char) {
                char[category][index] = !char[category][index];
                save();
                render();
            }
        }

        function deleteChar(id) {
            if (confirm("Remove this character?")) {
                state.characters = state.characters.filter(c => c.id !== id);
                save();
                render();
            }
        }

        function resetAll() {
            if (confirm("Clear all weekly progress for everyone?")) {
                state.characters.forEach(c => {
                    c.raid = [false, false, false];
                    c.dungeon = [false, false, false];
                    c.world = [false, false, false];
                });
                save();
                render();
            }
        }

        function setRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('selected');
                if (btn.dataset.role === role) btn.classList.add('selected');
            });
        }

        function openModal() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('charNameInput').focus();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function addCharacter() {
            const nameInput = document.getElementById('charNameInput');
            const classInput = document.getElementById('charClassInput');
            const name = nameInput.value.trim();
            if (name) {
                state.characters.push({
                    id: Date.now(),
                    name: name,
                    class: classInput.value,
                    role: selectedRole,
                    raid: [false, false, false],
                    dungeon: [false, false, false],
                    world: [false, false, false]
                });
                nameInput.value = '';
                closeModal();
                save();
                render();
            }
        }

        function render() {
            const list = document.getElementById('characterList');
            const empty = document.getElementById('emptyState');
            
            if (state.characters.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            
            empty.classList.add('hidden');
            list.innerHTML = state.characters.map(char => {
                const classColor = CLASS_COLORS[char.class] || '#ffffff';
                const roleIcon = ROLE_ICONS[char.role] || '';

                return `
                <div class="glass-panel rounded-xl md:rounded-2xl p-4 md:p-0 overflow-hidden">
                    <div class="grid grid-cols-1 md:grid-cols-12 items-center gap-4 md:gap-0">
                        
                        <!-- Name Section -->
                        <div class="md:col-span-3 px-6 py-4 flex items-center justify-between md:border-r border-slate-800">
                            <div class="flex items-center gap-3 overflow-hidden">
                                <div class="p-1.5 rounded-md bg-slate-800 text-slate-400 shrink-0 border border-slate-700">
                                    ${roleIcon}
                                </div>
                                <span class="font-bold truncate text-lg" style="color: ${classColor}">${char.name}</span>
                            </div>
                            <button onclick="deleteChar(${char.id})" class="text-slate-600 hover:text-red-400 transition-colors p-1 shrink-0 ml-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                            </button>
                        </div>

                        <!-- Activities -->
                        <div class="md:col-span-3 px-4 md:px-0 flex flex-col md:items-center gap-2 md:border-r border-slate-800">
                            <span class="md:hidden text-[10px] uppercase font-bold text-slate-500">Raids (2/4/6)</span>
                            <div class="flex gap-3 justify-center mb-2 md:mb-0">
                                ${char.raid.map((active, i) => `
                                    <div onclick="toggleSlot(${char.id}, 'raid', ${i})" 
                                         class="check-box w-10 h-10 md:w-8 md:h-8 rounded-lg border-2 cursor-pointer border-slate-700 flex items-center justify-center ${active ? 'active-raid' : 'bg-slate-800 hover:bg-slate-700'}">
                                         ${active ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>' : ''}
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="md:col-span-3 px-4 md:px-0 flex flex-col md:items-center gap-2 md:border-r border-slate-800">
                            <span class="md:hidden text-[10px] uppercase font-bold text-slate-500">Dungeons (1/4/8)</span>
                            <div class="flex gap-3 justify-center mb-2 md:mb-0">
                                ${char.dungeon.map((active, i) => `
                                    <div onclick="toggleSlot(${char.id}, 'dungeon', ${i})" 
                                         class="check-box w-10 h-10 md:w-8 md:h-8 rounded-lg border-2 cursor-pointer border-slate-700 flex items-center justify-center ${active ? 'active-dungeon' : 'bg-slate-800 hover:bg-slate-700'}">
                                         ${active ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>' : ''}
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="md:col-span-3 px-4 md:px-0 flex flex-col md:items-center gap-2">
                            <span class="md:hidden text-[10px] uppercase font-bold text-slate-500">World (2/4/8)</span>
                            <div class="flex gap-3 justify-center mb-2 md:mb-0">
                                ${char.world.map((active, i) => `
                                    <div onclick="toggleSlot(${char.id}, 'world', ${i})" 
                                         class="check-box w-10 h-10 md:w-8 md:h-8 rounded-lg border-2 cursor-pointer border-slate-700 flex items-center justify-center ${active ? 'active-world' : 'bg-slate-800 hover:bg-slate-700'}">
                                         ${active ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>' : ''}
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                    </div>
                </div>
            `;}).join('');
        }

        // Handle enter key on input
        document.getElementById('charNameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addCharacter();
        });

        // Initialize
        load();
    </script>
</body>
</html>
